<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="300">
    <title>Weather</title>
    <link rel="stylesheet" href="./weather-style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Warning Banner -->
    <div id="warning-message" class="warning-banner" role="alert"></div>

    <!-- Loading Overlay -->
    <div id="loading-overlay" class="loading-overlay">
        <div class="loading-spinner"></div>
        <p>Detecting your location...</p>
    </div>

    <!-- Error Message -->
    <div id="error-message" class="error-message" style="display:none;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <p id="error-text"></p>
        <button id="retry-btn" onclick="location.reload()">Retry</button>
    </div>

    <main id="main-content" style="display:none;">
        <!-- Header with Search -->
        <header class="app-header">
            <div class="search-container">
                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input type="text" id="search-input" class="search-input" placeholder="Search city..." autocomplete="off">
                <div id="search-results" class="search-results"></div>
            </div>
            <button id="unit-toggle" class="unit-toggle" title="Toggle temperature unit">°C</button>
        </header>

        <!-- Current Weather Hero -->
        <section class="hero-card">
            <div class="hero-top">
                <div class="hero-location">
                    <h1 class="location"></h1>
                    <p class="weather-summary"></p>
                </div>
                <div class="hero-icon">
                    <img id="weather-icon" class="weather-icon-img" src="" alt="Weather icon">
                </div>
            </div>
            <div class="hero-temp">
                <span class="temperature-degree">--</span>
                <span class="temperature-unit">°C</span>
            </div>
            <p class="feels-like-text">Feels like <span class="feels-like-degree">--</span><span class="feels-like-unit">°C</span></p>
        </section>

        <!-- Details Grid -->
        <section class="details-grid">
            <div class="detail-card">
                <div class="detail-label">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z"/></svg>
                    Humidity
                </div>
                <div class="detail-value humidity">--%</div>
            </div>
            <div class="detail-card">
                <div class="detail-label">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"/></svg>
                    Wind
                </div>
                <div class="detail-value wind-speed">-- km/h</div>
                <div class="detail-sub wind-direction"></div>
            </div>
            <div class="detail-card">
                <div class="detail-label">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v10l4.24 4.24"/><circle cx="12" cy="12" r="10"/></svg>
                    Pressure
                </div>
                <div class="detail-value pressure">-- hPa</div>
                <div class="detail-sub pressure-desc"></div>
            </div>
            <div class="detail-card">
                <div class="detail-label">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2"/></svg>
                    Gusts
                </div>
                <div class="detail-value wind-gust-speed">-- km/h</div>
            </div>
            <div class="detail-card">
                <div class="detail-label">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    UV Index
                </div>
                <div class="detail-value uv-index">--</div>
                <div class="detail-sub uv-desc"></div>
            </div>
            <div class="detail-card">
                <div class="detail-label">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                    Visibility
                </div>
                <div class="detail-value visibility">-- km</div>
            </div>
        </section>

        <!-- Sunrise / Sunset -->
        <section class="sun-card">
            <div class="sun-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17 18a5 5 0 0 0-10 0"/><line x1="12" y1="2" x2="12" y2="9"/><line x1="4.22" y1="10.22" x2="5.64" y2="11.64"/><line x1="1" y1="18" x2="3" y2="18"/><line x1="21" y1="18" x2="23" y2="18"/><line x1="18.36" y1="11.64" x2="19.78" y2="10.22"/><line x1="23" y1="22" x2="1" y2="22"/><polyline points="8,6 12,2 16,6"/>
                </svg>
                <div>
                    <div class="sun-label">Sunrise</div>
                    <div class="sun-time sunrise">--:--</div>
                </div>
            </div>
            <div class="sun-progress-container">
                <div class="sun-arc">
                    <svg viewBox="0 0 200 100" class="sun-arc-svg">
                        <path d="M10,90 Q100,0 190,90" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="2" stroke-dasharray="4,4"/>
                        <circle id="sun-position" cx="100" cy="45" r="6" fill="#FFD700" style="display:none;"/>
                    </svg>
                </div>
            </div>
            <div class="sun-item">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M17 18a5 5 0 0 0-10 0"/><line x1="12" y1="9" x2="12" y2="2"/><line x1="4.22" y1="10.22" x2="5.64" y2="11.64"/><line x1="1" y1="18" x2="3" y2="18"/><line x1="21" y1="18" x2="23" y2="18"/><line x1="18.36" y1="11.64" x2="19.78" y2="10.22"/><line x1="23" y1="22" x2="1" y2="22"/><polyline points="16,6 12,10 8,6"/>
                </svg>
                <div>
                    <div class="sun-label">Sunset</div>
                    <div class="sun-time sunset">--:--</div>
                </div>
            </div>
        </section>

        <!-- Hourly Forecast -->
        <section class="forecast-section">
            <h2 class="section-title">Hourly Forecast</h2>
            <div class="hourly-scroll" id="hourly-container"></div>
        </section>

        <!-- 5-Day Forecast -->
        <section class="forecast-section">
            <h2 class="section-title">5-Day Forecast</h2>
            <div class="daily-forecast" id="daily-container"></div>
        </section>

        <!-- Footer -->
        <footer class="app-footer">
            <div class="date-and-time"></div>
            <div class="footer-links">
                <a href="https://satellite-image-project.vercel.app/" target="_blank" rel="noopener">Satellite Image</a>
                <span class="dot-sep"></span>
                <span>Powered by <a href="https://www.weatherapi.com/" target="_blank" rel="noopener">WeatherAPI.com</a></span>
            </div>
        </footer>
    </main>

    <script src="./app.js"></script>
</body>
</html>
